        const highlightsList = document.getElementById('modalHighlights');
        let currentOpenProjectId = null;

        // Apply language across all elements dynamically
        function updateDOM() {
            document.querySelectorAll('[data-' + currentLang + ']').forEach(el => {
                el.innerHTML = el.getAttribute('data-' + currentLang);
            });
            document.getElementById('langToggleLabel').textContent = currentLang.toUpperCase() + ' | ' + (currentLang === 'fr' ? 'EN' : 'FR');
        }

        // Language Switcher Function
        function toggleLanguage() {
            currentLang = currentLang === 'fr' ? 'en' : 'fr';
            updateDOM();

            // If modal is currently open, update its content dynamically
            if (currentOpenProjectId) {
                renderModalContent(currentOpenProjectId);
            }
        }

        function renderModalContent(projectId) {
            const data = projectData[projectId];
            if (!data) return;
            const langData = data[currentLang] || data['fr'];

            mediaContainer.innerHTML = data.mediaHtml;
            categoryLabel.textContent = langData.category;
            titleLabel.textContent = langData.title;
            descLabel.textContent = langData.description;
            
            highlightsList.innerHTML = langData.highlights.map(pt => `
                <li class="flex items-start gap-2.5">
                    <span class="text-blue-500 mt-1 text-xs"><i class="fa-solid fa-chevron-right"></i></span>
                    <span>${pt}</span>
                </li>
            `).join('');

            // Automatically speed up video playback rate in web browser (2x speed)
            const activeVideo = mediaContainer.querySelector('video');
            if (activeVideo) {
                activeVideo.playbackRate = 2;
            }
        }

        function openModal(projectId) {
            currentOpenProjectId = projectId;
            renderModalContent(projectId);

            modal.classList.remove('pointer-events-none', 'opacity-0');
            modalContainer.classList.remove('scale-95');
            modalContainer.classList.add('scale-100');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modal.classList.add('pointer-events-none', 'opacity-0');
            modalContainer.classList.remove('scale-100');
            modalContainer.classList.add('scale-95');
            document.body.style.overflow = '';
            currentOpenProjectId = null;
            
            const activeVideo = mediaContainer.querySelector('video');
            if (activeVideo) activeVideo.pause();
        }

        modal.addEventListener('click', function(e) {
            if (e.target === modal) closeModal();
        });

        // Initialize DOM text content on page load from single source of truth
        window.addEventListener('DOMContentLoaded', () => {
            updateDOM();
        });
    </script>
</body>
</html>
